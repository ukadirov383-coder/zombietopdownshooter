<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zombie Shooter</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        canvas { background: #222; border: 2px solid #444; display: block; margin: 20px auto; cursor: crosshair; }
        #score-board { font-size: 24px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="score-board">Score: <span id="score">0</span> | Health: <span id="hp">100</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game State
        let player = { x: 400, y: 300, size: 20, speed: 4, hp: 100 };
        let bullets = [];
        let zombies = [];
        let keys = {};
        let score = 0;
        let mouse = { x: 0, y: 0 };

        // Input Listeners
        window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener("mousemove", e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        canvas.addEventListener("mousedown", () => {
            if (player.hp > 0) shoot();
        });

        // Shooting Logic
        function shoot() {
            let angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                dx: Math.cos(angle) * 8,
                dy: Math.sin(angle) * 8,
                size: 4
            });
        }

        // Spawn Zombies
        setInterval(() => {
            if (player.hp <= 0) return;
            // Spawn at random screen edges
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 : canvas.width;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 : canvas.height;
            }
            zombies.push({ x: x, y: y, size: 15, speed: 1.5 });
        }, 1500);

        // Game Loop
        function update() {
            if (player.hp <= 0) {
                ctx.fillStyle = "red";
                ctx.font = "50px sans-serif";
                ctx.fillText("GAME OVER", 260, 300);
                return;
            }

            // 1. Move Player
            if (keys['w'] && player.y > player.size) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys['a'] && player.x > player.size) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.size) player.x += player.speed;

            // 2. Move & Filter Bullets
            bullets.forEach((b, index) => {
                b.x += b.dx;
                b.y += b.dy;
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // 3. Move Zombies & Collisions
            zombies.forEach((z, zIdx) => {
                let angle = Math.atan2(player.y - z.y, player.x - z.x);
                z.x += Math.cos(angle) * z.speed;
                z.y += Math.sin(angle) * z.speed;

                // Zombie hits Player
                let distToPlayer = Math.hypot(player.x - z.x, player.y - z.y);
                if (distToPlayer < player.size + z.size) {
                    player.hp -= 0.5; // Damage over time
                    document.getElementById("hp").textContent = Math.max(0, Math.floor(player.hp));
                }

                // Bullet hits Zombie
                bullets.forEach((b, bIdx) => {
                    let distToBullet = Math.hypot(b.x - z.x, b.y - z.y);
                    if (distToBullet < z.size + b.size) {
                        zombies.splice(zIdx, 1);
                        bullets.splice(bIdx, 1);
                        score += 10;
                        document.getElementById("score").textContent = score;
                    }
                });
            });

            // 4. Drawing Everything
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Bullets (Yellow)
            ctx.fillStyle = "yellow";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Zombies (Green)
            ctx.fillStyle = "green";
            zombies.forEach(z => {
                ctx.beginPath();
                ctx.arc(z.x, z.y, z.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Player (Blue)
            ctx.fillStyle = "cyan";
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
